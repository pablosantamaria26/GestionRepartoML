<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="theme-color" content="#0a0f1a"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<link rel="manifest" href="manifest.json"/>
<link rel="icon" href="icon-192.png"/>
<link rel="apple-touch-icon" href="icon-192.png"/>
<title>Reparto ML</title>

<!-- Firebase (compat para simplicidad) -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

<!-- Fuente display + body -->
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@600&display=swap" rel="stylesheet"/>

<style>
/* ============================================================
   DESIGN TOKENS — industrial/utilitarian mobile-first
   ============================================================ */
:root{
  --bg:#0a0f1a;--surface:#111827;--surface2:#1a2234;--surface3:#1f2b3d;
  --border:#253044;--border-hi:#3b4f6b;
  --text:#e8ecf2;--text2:#94a3b8;--text3:#64748b;
  --accent:#3b82f6;--accent-hi:#60a5fa;
  --ok:#22c55e;--ok-bg:rgba(34,197,94,.12);--ok-border:#166534;
  --warn:#f59e0b;--warn-bg:rgba(245,158,11,.10);--warn-border:#92400e;
  --danger:#ef4444;--danger-bg:rgba(239,68,68,.10);
  --radius:14px;--radius-sm:10px;
  --font:'DM Sans',system-ui,-apple-system,sans-serif;
  --mono:'JetBrains Mono',ui-monospace,monospace;
  --safe-b:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{
  font-family:var(--font);background:var(--bg);color:var(--text);
  display:flex;flex-direction:column;height:100dvh;
  -webkit-font-smoothing:antialiased;
}

/* ============================================================
   LAYOUT SHELL
   ============================================================ */
.topbar{
  flex-shrink:0;padding:14px 16px 10px;
  background:linear-gradient(180deg,#0d1322 0%,var(--bg) 100%);
  border-bottom:1px solid var(--border);
  display:flex;justify-content:space-between;align-items:center;
  gap:10px;z-index:20;
}
.topbar h1{font-size:1.15rem;font-weight:700;letter-spacing:.02em}
.topbar .chip{
  font-family:var(--mono);font-size:.78rem;font-weight:600;
  padding:5px 10px;border-radius:999px;
  background:var(--surface2);border:1px solid var(--border);
  color:var(--accent-hi);
}

.info-strip{
  flex-shrink:0;padding:8px 16px;
  background:var(--surface);border-bottom:1px solid var(--border);
  display:flex;justify-content:space-between;align-items:center;
  font-size:.85rem;color:var(--text2);
}
.info-strip strong{color:var(--text)}

.progress-bar{
  flex-shrink:0;height:4px;background:var(--surface2);position:relative;
}
.progress-bar .fill{
  height:100%;background:linear-gradient(90deg,var(--ok),#4ade80);
  transition:width .4s ease;width:0%;
}

/* Main scroll area */
.scroll-area{
  flex:1;overflow-y:auto;overflow-x:hidden;
  -webkit-overflow-scrolling:touch;overscroll-behavior:contain;
  padding:10px 12px 100px;
}

/* Bottom bar */
.bottom-bar{
  flex-shrink:0;
  padding:10px 12px calc(10px + var(--safe-b));
  background:var(--surface);border-top:1px solid var(--border);
  display:flex;gap:8px;z-index:20;
}
.btn-bar{
  flex:1;border:none;border-radius:var(--radius-sm);
  padding:14px 6px;font-family:var(--font);font-size:.82rem;font-weight:600;
  cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;
  transition:all .15s ease;color:var(--text);
}
.btn-bar .ico{font-size:1.3rem}
.btn-bar:active{transform:scale(.96)}
.btn-bar:disabled{opacity:.4;pointer-events:none}
.btn-save{background:#1e3a5f;border:1px solid #2563eb}
.btn-save:hover{background:#1e40af}
.btn-route{background:var(--surface2);border:1px solid var(--border)}
.btn-route:hover{background:var(--surface3)}
.btn-send{background:#14532d;border:1px solid var(--ok-border)}
.btn-send:hover{background:#166534}

/* ============================================================
   CARDS
   ============================================================ */
.card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:14px 16px;margin-bottom:10px;
  cursor:pointer;transition:all .12s ease;position:relative;
  overflow:hidden;
}
.card:active{transform:scale(.985);border-color:var(--border-hi)}
.card.done{background:var(--ok-bg);border-color:var(--ok-border)}
.card.done .card-name{text-decoration:line-through;opacity:.7}
.card.dev{background:var(--warn-bg);border-color:var(--warn-border)}
.card.nopay{border-left:4px solid var(--danger)}

.card-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.card-num{
  font-family:var(--mono);font-size:.82rem;font-weight:600;
  color:var(--accent-hi);letter-spacing:.03em;
}
.card-orden{
  width:48px;height:32px;text-align:center;
  font-family:var(--mono);font-size:1rem;font-weight:600;
  background:var(--surface2);border:1px solid var(--border);
  border-radius:8px;color:var(--text);
}
.card-orden:focus{border-color:var(--accent);outline:none;box-shadow:0 0 0 2px rgba(59,130,246,.3)}
.card-name{font-size:1.05rem;font-weight:600;margin-bottom:4px}
.card-addr{font-size:.82rem;color:var(--text2);margin-bottom:6px}
.card-badges{display:flex;gap:6px;flex-wrap:wrap;font-size:.78rem;font-weight:600}
.badge{padding:3px 8px;border-radius:6px}
.badge-ok{background:rgba(34,197,94,.2);color:#4ade80}
.badge-pend{background:rgba(239,68,68,.15);color:#f87171}
.badge-dev{background:rgba(245,158,11,.15);color:#fbbf24}
.badge-nopay{background:var(--danger-bg);color:#f87171}
.badge-photo{background:rgba(59,130,246,.15);color:var(--accent-hi)}

.empty-state{
  text-align:center;padding:3rem 1rem;color:var(--text3);
  font-size:.95rem;
}

/* ============================================================
   MODAL
   ============================================================ */
.modal-bg{
  position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;
  display:none;align-items:flex-end;justify-content:center;
}
.modal-bg.open{display:flex}
.modal{
  background:var(--surface);border-radius:20px 20px 0 0;
  width:100%;max-width:500px;max-height:88vh;
  overflow-y:auto;-webkit-overflow-scrolling:touch;
  padding:20px 18px calc(20px + var(--safe-b));
  border-top:1px solid var(--border-hi);
  animation:slideUp .25s ease;
}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}

.modal h3{font-size:1.15rem;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.modal .field{margin-bottom:14px}
.modal label{display:block;font-size:.82rem;font-weight:600;color:var(--text2);margin-bottom:5px}
.modal select,.modal input[type="number"],.modal textarea{
  width:100%;padding:11px 12px;font-size:1rem;font-family:var(--font);
  background:var(--surface2);color:var(--text);border:1px solid var(--border);
  border-radius:var(--radius-sm);
}
.modal select:focus,.modal input:focus,.modal textarea:focus{
  border-color:var(--accent);outline:none;
  box-shadow:0 0 0 2px rgba(59,130,246,.25);
}
.modal textarea{resize:vertical;min-height:56px}

.modal .pay-group{
  border:1px solid var(--border);border-radius:var(--radius-sm);
  padding:12px;margin-bottom:12px;background:var(--surface2);
}
.modal .pay-group legend{
  font-size:.8rem;font-weight:700;color:var(--accent-hi);padding:0 4px;
}
.modal .pay-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:8px}

.modal .dev-row{
  display:flex;align-items:center;gap:10px;margin-bottom:12px;
}
.modal .dev-row input[type="checkbox"]{
  width:24px;height:24px;accent-color:var(--warn);
}

.modal-actions{display:flex;flex-direction:column;gap:8px;margin-top:16px}
.mbtn{
  width:100%;padding:14px;border:none;border-radius:var(--radius-sm);
  font-family:var(--font);font-size:.95rem;font-weight:600;
  cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;
  transition:all .12s ease;
}
.mbtn:active{transform:scale(.97)}
.mbtn:disabled{opacity:.45;pointer-events:none}
.mbtn-ok{background:var(--ok);color:#fff}
.mbtn-nopay{background:var(--warn);color:#fff}
.mbtn-photo{background:var(--accent);color:#fff}
.mbtn-gallery{background:#0284c7;color:#fff}
.mbtn-close{background:var(--surface3);color:var(--text2);border:1px solid var(--border)}

.modal .locked-overlay{
  position:absolute;inset:0;background:rgba(10,15,26,.85);
  display:none;align-items:center;justify-content:center;
  font-size:1.1rem;font-weight:700;color:var(--text3);
  border-radius:20px 20px 0 0;z-index:5;
}
.modal .locked-overlay.show{display:flex}

/* ============================================================
   TOAST
   ============================================================ */
.toast{
  position:fixed;bottom:calc(90px + var(--safe-b));left:50%;
  transform:translateX(-50%) translateY(20px);
  background:var(--surface);color:var(--text);
  padding:10px 18px;border-radius:var(--radius-sm);
  font-size:.88rem;font-weight:500;
  box-shadow:0 8px 30px rgba(0,0,0,.5);border:1px solid var(--border-hi);
  opacity:0;transition:all .3s ease;pointer-events:none;z-index:200;
  text-align:center;max-width:90%;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* LOADING OVERLAY */
.loading-bg{
  position:fixed;inset:0;background:rgba(10,15,26,.85);
  display:none;align-items:center;justify-content:center;
  flex-direction:column;gap:14px;z-index:300;
  color:var(--text);font-size:1rem;font-weight:500;
}
.loading-bg.show{display:flex}
.spinner{
  width:28px;height:28px;border:3px solid var(--border-hi);
  border-top-color:var(--accent);border-radius:50%;
  animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* LOGIN SCREEN */
.login-screen{
  position:fixed;inset:0;background:var(--bg);z-index:500;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:20px;padding:24px;
}
.login-screen h2{font-size:1.5rem;text-align:center}
.login-screen p{color:var(--text2);font-size:.9rem;text-align:center}
.login-input{
  width:100%;max-width:320px;padding:14px;font-size:1.1rem;
  font-family:var(--font);background:var(--surface);color:var(--text);
  border:1px solid var(--border);border-radius:var(--radius);text-align:center;
}
.login-input:focus{border-color:var(--accent);outline:none}
.login-btn{
  width:100%;max-width:320px;padding:14px;border:none;
  border-radius:var(--radius);background:var(--accent);color:#fff;
  font-size:1rem;font-weight:700;cursor:pointer;
}

/* TURNO SELECT SCREEN */
.turno-screen{
  position:fixed;inset:0;background:var(--bg);z-index:400;
  display:none;flex-direction:column;align-items:center;justify-content:center;
  gap:16px;padding:24px;
}
.turno-screen.show{display:flex}
.turno-screen h2{font-size:1.3rem}
.turno-btn{
  width:100%;max-width:300px;padding:18px;border:2px solid var(--border);
  border-radius:var(--radius);background:var(--surface);color:var(--text);
  font-size:1.1rem;font-weight:700;cursor:pointer;text-align:center;
  transition:all .15s ease;
}
.turno-btn:hover{border-color:var(--accent);background:var(--surface2)}
.turno-btn:disabled{opacity:.4;pointer-events:none}
.turno-btn .sub{font-size:.8rem;font-weight:400;color:var(--text3);margin-top:4px}

/* Sync indicator */
.sync-dot{
  width:8px;height:8px;border-radius:50%;display:inline-block;
  margin-right:4px;vertical-align:middle;
}
.sync-dot.ok{background:var(--ok)}
.sync-dot.syncing{background:var(--warn);animation:pulse 1s infinite}
.sync-dot.off{background:var(--danger)}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
</style>
</head>
<body>

<!-- ============ LOGIN ============ -->
<div class="login-screen" id="loginScreen">
  <div style="font-size:2.5rem">📦</div>
  <h2>Reparto ML</h2>
  <p>Ingresá tu nombre para comenzar la jornada</p>
  <input type="text" class="login-input" id="loginName" placeholder="Tu nombre" autocomplete="off"/>
  <button class="login-btn" id="loginBtn">Comenzar →</button>
</div>

<!-- ============ TURNO SELECT ============ -->
<div class="turno-screen" id="turnoScreen">
  <div style="font-size:2rem">🕐</div>
  <h2>Seleccioná el turno</h2>
  <button class="turno-btn" data-turno="Mañana" id="turnoManana">
    ☀️ Mañana
    <div class="sub" id="turnoMananaStatus"></div>
  </button>
  <button class="turno-btn" data-turno="Tarde" id="turnoTarde">
    🌙 Tarde
    <div class="sub" id="turnoTardeStatus"></div>
  </button>
</div>

<!-- ============ MAIN APP ============ -->
<div class="topbar">
  <h1>📦 Reparto</h1>
  <span class="chip" id="chipTurno">—</span>
</div>

<div class="info-strip">
  <span><span class="sync-dot ok" id="syncDot"></span> <span id="syncLabel">Listo</span></span>
  <span id="repartidorLabel">—</span>
  <strong id="contadorLabel">0/0</strong>
</div>

<div class="progress-bar"><div class="fill" id="progressFill"></div></div>

<div class="scroll-area" id="scrollArea">
  <div class="empty-state" id="emptyState">No hay pedidos para mostrar.</div>
  <div id="cardContainer"></div>
</div>

<div class="bottom-bar">
  <button class="btn-bar btn-save" id="btnSave">
    <span class="ico">💾</span>Guardar
  </button>
  <button class="btn-bar btn-route" id="btnRoute">
    <span class="ico">🗺️</span>Ruta
  </button>
  <button class="btn-bar btn-send" id="btnSend">
    <span class="ico">📤</span>Rendición
  </button>
</div>

<!-- ============ MODAL ============ -->
<div class="modal-bg" id="modalBg">
  <div class="modal" id="modal">
    <div class="locked-overlay" id="lockedOverlay">🔒 PEDIDO PROCESADO</div>
    <h3 id="mTitle">—</h3>
    <p style="font-size:.88rem;color:var(--text2);margin-bottom:14px">
      Importe: <strong id="mImporte" style="color:var(--text)">—</strong>
    </p>

    <fieldset class="pay-group">
      <legend>Pago 1</legend>
      <div class="field">
        <label>Forma de pago</label>
        <select id="mFP1">
          <option value="">— Seleccionar —</option>
          <option value="Efectivo">Efectivo</option>
          <option value="Transferencia">Transferencia</option>
          <option value="Cheque">Cheque</option>
          <option value="No pagó">No pagó</option>
        </select>
      </div>
      <div class="field">
        <label>Importe</label>
        <input type="number" id="mImp1" min="0" step="0.01" inputmode="decimal" placeholder="0.00"/>
      </div>
    </fieldset>

    <fieldset class="pay-group">
      <legend>Pago 2 (opcional)</legend>
      <div class="pay-row">
        <div class="field">
          <label>Forma</label>
          <select id="mFP2">
            <option value="">— Ninguno —</option>
            <option value="Efectivo">Efectivo</option>
            <option value="Transferencia">Transferencia</option>
            <option value="Cheque">Cheque</option>
          </select>
        </div>
        <div class="field">
          <label>Importe</label>
          <input type="number" id="mImp2" min="0" step="0.01" inputmode="decimal" placeholder="0.00"/>
        </div>
      </div>
    </fieldset>

    <div class="dev-row">
      <input type="checkbox" id="mDev"/>
      <label for="mDev" style="font-size:.95rem;font-weight:600;color:var(--warn)">¿Devolución?</label>
    </div>
    <div class="field">
      <label>Notas de devolución</label>
      <textarea id="mNotas" placeholder="Ej: Devolvió 2 unidades de..."></textarea>
    </div>

    <div class="modal-actions">
      <button class="mbtn mbtn-photo" id="mBtnPhoto">📷 Tomar Comprobante</button>
      <button class="mbtn mbtn-gallery" id="mBtnGallery">🖼️ Subir desde Galería</button>
      <button class="mbtn mbtn-ok" id="mBtnOk">✅ Guardar y Marcar Entregado</button>
      <button class="mbtn mbtn-nopay" id="mBtnNoPay">🚫 Entregado (NO pagó)</button>
      <button class="mbtn mbtn-close" id="mBtnClose">✖ Cerrar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<div class="loading-bg" id="loadingBg">
  <div class="spinner"></div>
  <span id="loadingText">Cargando...</span>
</div>

<input type="file" id="fileCamera" accept="image/*" capture="camera" style="display:none"/>
<input type="file" id="fileGallery" accept="image/*" style="display:none"/>

<!-- ============================================================
     APP LOGIC
     ============================================================ -->
<script>
// ─── CONFIG ───────────────────────────────────────────
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyAnkoNLZVW6bsus3XzJUZTNWWYaFNwKIwU",
  authDomain: "mercadolimpio-reparto.firebaseapp.com",
  databaseURL: "https://mercadolimpio-reparto-default-rtdb.firebaseio.com",
  projectId: "mercadolimpio-reparto",
  storageBucket: "mercadolimpio-reparto.firebasestorage.app",
  messagingSenderId: "283563066503",
  appId: "1:283563066503:web:db5ad2f760f9811fdae422"
};

// ⚠️ IMPORTANTE: Reemplazá esta URL con tu Web App URL deployada de GAS
const GAS_URL = 'TU_WEB_APP_URL_AQUI';

// ─── FIREBASE INIT ────────────────────────────────────
firebase.initializeApp(FIREBASE_CONFIG);
firebase.auth().signInAnonymously().catch(e => console.warn('Auth error:', e));
const db = firebase.database();

// ─── STATE ────────────────────────────────────────────
const S = {
  repartidor: '',
  turno: '',
  pedidos: [],       // array from Firebase
  modalIdx: -1,
  saving: false,
  fbReady: false,
};

// ─── HELPERS ──────────────────────────────────────────
const $ = id => document.getElementById(id);
const fechaAR = () => {
  const d = new Date();
  const offset = d.getTimezoneOffset() + (-3 * 60); // UTC-3
  const local = new Date(d.getTime() - offset * 60000);
  return local.toISOString().slice(0, 10);
};
const money = n => Number(n || 0).toLocaleString('es-AR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
const fbPath = () => `reparto/${fechaAR()}/${S.turno}`;

function toast(msg, ms = 3000) {
  const t = $('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toast._t);
  toast._t = setTimeout(() => t.classList.remove('show'), ms);
}
function showLoad(txt) { $('loadingText').textContent = txt; $('loadingBg').classList.add('show'); }
function hideLoad() { $('loadingBg').classList.remove('show'); }
function setSync(status) {
  const dot = $('syncDot');
  const lbl = $('syncLabel');
  dot.className = 'sync-dot ' + status;
  lbl.textContent = status === 'ok' ? 'Sincronizado' : status === 'syncing' ? 'Sincronizando...' : 'Sin conexión';
}

// ─── LOGIN ────────────────────────────────────────────
function initLogin() {
  const hoy = fechaAR();
  const key = `repartidor_${hoy}`;
  const saved = localStorage.getItem(key);
  if (saved) {
    S.repartidor = saved;
    $('loginScreen').style.display = 'none';
    showTurnoScreen();
    return;
  }
  $('loginBtn').onclick = () => {
    const name = $('loginName').value.trim();
    if (!name) return toast('Ingresá tu nombre');
    S.repartidor = name;
    localStorage.setItem(key, name);
    $('loginScreen').style.display = 'none';
    showTurnoScreen();
  };
  $('loginName').addEventListener('keydown', e => { if (e.key === 'Enter') $('loginBtn').click(); });
}

// ─── TURNO SCREEN ─────────────────────────────────────
function showTurnoScreen() {
  $('turnoScreen').classList.add('show');
  // Check GAS for turno status
  checkTurnoStatus();
  $('turnoManana').onclick = () => selectTurno('Mañana');
  $('turnoTarde').onclick = () => selectTurno('Tarde');
}

async function checkTurnoStatus() {
  try {
    const resp = await gasPost({ action: 'getEstadoTurnos', repartidor: S.repartidor });
    if (resp && resp.estado) {
      ['Mañana', 'Tarde'].forEach(t => {
        const st = resp.estado[t];
        const btn = t === 'Mañana' ? $('turnoManana') : $('turnoTarde');
        const sub = t === 'Mañana' ? $('turnoMananaStatus') : $('turnoTardeStatus');
        if (st === 'finalizado') {
          btn.disabled = true;
          sub.textContent = '🔒 Finalizado';
        } else if (st === 'abierto') {
          sub.textContent = '📦 En curso';
        } else {
          sub.textContent = 'Sin datos';
        }
      });
    }
  } catch (e) {
    console.warn('No se pudo verificar estado de turnos:', e);
  }
}

function selectTurno(turno) {
  S.turno = turno;
  localStorage.setItem('ultimoTurno', turno);
  $('turnoScreen').classList.remove('show');
  startApp();
}

// ─── GAS COMMUNICATION ───────────────────────────────
async function gasPost(body) {
  const resp = await fetch(GAS_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify(body),
  });
  return resp.json();
}

// ─── MAIN APP START ──────────────────────────────────
async function startApp() {
  $('chipTurno').textContent = S.turno;
  $('repartidorLabel').textContent = S.repartidor;

  // 1) Try to load from Firebase (fast)
  showLoad('Cargando pedidos...');
  const fbRef = db.ref(fbPath() + '/pedidos');

  try {
    const snap = await fbRef.once('value');
    const fbData = snap.val();
    if (fbData && Object.keys(fbData).length > 0) {
      S.pedidos = Object.values(fbData);
      render();
      hideLoad();
      toast('📦 Pedidos cargados');
      setupRealtimeSync();
      return;
    }
  } catch (e) {
    console.warn('Firebase read failed:', e);
  }

  // 2) Fallback: load from GAS and push to Firebase
  try {
    const resp = await gasPost({
      action: 'obtenerDatosReparto',
      turno: S.turno,
      repartidor: S.repartidor
    });
    if (resp && resp.success !== false && Array.isArray(resp.pedidos)) {
      S.pedidos = resp.pedidos;
      // Push to Firebase for future fast loads
      await pushAllToFirebase();
      render();
      hideLoad();
      toast('📦 Reparto sincronizado desde sistema');
      setupRealtimeSync();
      return;
    }
  } catch (e) {
    console.warn('GAS load failed:', e);
  }

  // 3) Last resort: localStorage
  const cached = localStorage.getItem(`cache_${fechaAR()}_${S.turno}`);
  if (cached) {
    S.pedidos = JSON.parse(cached);
    render();
    hideLoad();
    toast('📱 Cargado desde caché local');
  } else {
    hideLoad();
    toast('No se encontraron pedidos');
  }
  setupRealtimeSync();
}

// ─── FIREBASE SYNC ───────────────────────────────────
function setupRealtimeSync() {
  const fbRef = db.ref(fbPath() + '/pedidos');
  // Listen for changes from other devices
  fbRef.on('value', snap => {
    const data = snap.val();
    if (!data || S.saving) return;
    const incoming = Object.values(data);
    // Only update if different (avoid render loop)
    if (JSON.stringify(incoming) !== JSON.stringify(S.pedidos)) {
      S.pedidos = incoming;
      render();
      cacheLocal();
    }
  });
  S.fbReady = true;
}

async function pushAllToFirebase() {
  try {
    const obj = {};
    S.pedidos.forEach((p, i) => { obj[p.numeroCliente || i] = p; });
    await db.ref(fbPath() + '/pedidos').set(obj);
    setSync('ok');
  } catch (e) {
    console.warn('Firebase push failed:', e);
    setSync('off');
  }
}

async function pushOneToFirebase(pedido) {
  try {
    setSync('syncing');
    await db.ref(fbPath() + '/pedidos/' + pedido.numeroCliente).set(pedido);
    setSync('ok');
  } catch (e) {
    console.warn('Firebase single push failed:', e);
    setSync('off');
  }
}

function cacheLocal() {
  try {
    localStorage.setItem(`cache_${fechaAR()}_${S.turno}`, JSON.stringify(S.pedidos));
  } catch (_) {}
}

// ─── SYNC TO GAS (background) ────────────────────────
let gasSyncTimeout = null;
function scheduleGasSync() {
  clearTimeout(gasSyncTimeout);
  gasSyncTimeout = setTimeout(async () => {
    try {
      await gasPost({ action: 'guardarDatosReparto', pedidos: S.pedidos });
      console.log('GAS sync OK');
    } catch (e) {
      console.warn('GAS background sync failed:', e);
    }
  }, 3000); // 3 seconds debounce
}

// ─── RENDER ──────────────────────────────────────────
function render() {
  const container = $('cardContainer');
  const empty = $('emptyState');

  if (S.pedidos.length === 0) {
    container.innerHTML = '';
    empty.style.display = 'block';
    updateUI();
    return;
  }
  empty.style.display = 'none';

  // Sort: pending first by order, then done
  const sorted = [...S.pedidos].sort((a, b) => {
    if (!a.entregado && b.entregado) return -1;
    if (a.entregado && !b.entregado) return 1;
    return (Number(a.orden) || 9999) - (Number(b.orden) || 9999);
  });

  container.innerHTML = sorted.map((p, visualIdx) => {
    const realIdx = S.pedidos.indexOf(p);
    const totalPaid = (Number(p.importePagado1) || 0) + (Number(p.importePagado2) || 0);
    const noPay = p.entregado && !p.devolucion && totalPaid === 0;

    let cls = 'card';
    if (p.entregado) cls += ' done';
    if (p.devolucion) cls += ' dev';
    if (noPay) cls += ' nopay';

    let badges = '';
    if (p.entregado) badges += '<span class="badge badge-ok">✅ Entregado</span>';
    else badges += '<span class="badge badge-pend">Pendiente</span>';
    if (p.devolucion) badges += '<span class="badge badge-dev">⚠️ Devolución</span>';
    if (noPay) badges += '<span class="badge badge-nopay">🔴 Sin pago</span>';
    if (p.comprobanteId) badges += '<span class="badge badge-photo">📷</span>';

    return `<div class="${cls}" data-idx="${realIdx}" onclick="openModal(${realIdx})">
      <div class="card-top">
        <span class="card-num">Nº ${p.numeroCliente || ''}</span>
        <input type="number" class="card-orden" value="${p.orden || ''}"
          ${p.entregado ? 'disabled' : ''}
          onclick="event.stopPropagation()"
          onchange="updateOrden(${realIdx}, this.value)" min="1"/>
      </div>
      <div class="card-name">${p.nombre || ''}</div>
      <div class="card-addr">📍 ${p.domicilio || ''}, ${p.localidad || ''}</div>
      <div class="card-badges">${badges}</div>
    </div>`;
  }).join('');

  updateUI();
  cacheLocal();
}

function updateUI() {
  const total = S.pedidos.length;
  const done = S.pedidos.filter(p => p.entregado).length;
  $('contadorLabel').textContent = `${done}/${total}`;

  const pct = total > 0 ? Math.round(done / total * 100) : 0;
  $('progressFill').style.width = pct + '%';

  const allDone = total > 0 && done === total;
  const uploading = S.pedidos.some(p => p._uploading);
  $('btnSend').disabled = !allDone || uploading;
}

// ─── ORDER UPDATE ────────────────────────────────────
function updateOrden(idx, val) {
  S.pedidos[idx].orden = parseInt(val) || 0;
  pushOneToFirebase(S.pedidos[idx]);
  scheduleGasSync();
  cacheLocal();
}

// ─── MODAL ───────────────────────────────────────────
function openModal(idx) {
  const p = S.pedidos[idx];
  if (!p) return;
  S.modalIdx = idx;

  $('mTitle').textContent = `${p.nombre || 'Cliente'} — Nº ${p.numeroCliente}`;
  $('mImporte').textContent = '$ ' + money(p.importeTotal);
  $('mFP1').value = p.formaPago1 || '';
  $('mImp1').value = p.importePagado1 || '';
  $('mFP2').value = p.formaPago2 || '';
  $('mImp2').value = p.importePagado2 || '';
  $('mDev').checked = !!p.devolucion;
  $('mNotas').value = p.notasDevolucion || '';

  const locked = !!p.entregado;
  $('lockedOverlay').classList.toggle('show', locked);
  ['mFP1', 'mImp1', 'mFP2', 'mImp2', 'mDev', 'mNotas', 'mBtnOk', 'mBtnNoPay', 'mBtnPhoto', 'mBtnGallery']
    .forEach(id => $(id).disabled = locked);

  $('modalBg').classList.add('open');
}

function closeModal() {
  $('modalBg').classList.remove('open');
  S.modalIdx = -1;
}

// ─── MARK DELIVERED ──────────────────────────────────
async function markDelivered(noPay = false) {
  if (S.saving || S.modalIdx < 0) return;
  const p = S.pedidos[S.modalIdx];

  if (noPay) {
    p.formaPago1 = 'No pagó';
    p.importePagado1 = 0;
    p.formaPago2 = '';
    p.importePagado2 = 0;
    p.devolucion = false;
    p.notasDevolucion = $('mNotas').value.trim();
  } else {
    p.formaPago1 = $('mFP1').value;
    p.importePagado1 = parseFloat($('mImp1').value) || 0;
    p.formaPago2 = $('mFP2').value;
    p.importePagado2 = parseFloat($('mImp2').value) || 0;
    p.devolucion = $('mDev').checked;
    p.notasDevolucion = $('mNotas').value.trim();
  }

  if (!noPay && !p.devolucion && !p.formaPago1 && (p.importeTotal || 0) > 0) {
    return toast('Registrá un pago o marcá como devolución');
  }

  p.entregado = true;
  S.saving = true;

  // 1) Instant: Firebase + local
  closeModal();
  render();
  await pushOneToFirebase(p);
  cacheLocal();
  toast(noPay ? '🚫 Entregado (sin pago)' : '✅ Entregado');

  // 2) Background: GAS
  try {
    await gasPost({ action: 'guardarDatosReparto', pedidos: [p] });
  } catch (e) {
    console.warn('GAS save failed, will retry:', e);
    queueGasRetry(p);
  }

  S.saving = false;
}

// Retry queue for offline
function queueGasRetry(pedido) {
  try {
    const key = 'gasRetryQueue';
    const q = JSON.parse(localStorage.getItem(key) || '[]');
    q.push(pedido);
    localStorage.setItem(key, JSON.stringify(q));
  } catch (_) {}
}

async function flushGasRetryQueue() {
  const key = 'gasRetryQueue';
  const q = JSON.parse(localStorage.getItem(key) || '[]');
  if (q.length === 0) return;
  try {
    await gasPost({ action: 'guardarDatosReparto', pedidos: q });
    localStorage.removeItem(key);
    toast('📤 Datos pendientes sincronizados');
  } catch (_) {}
}

// ─── PHOTOS (via GAS) ────────────────────────────────
function handlePhoto(file) {
  if (!file || S.modalIdx < 0) return;
  const p = S.pedidos[S.modalIdx];
  const reader = new FileReader();
  reader.onload = async (e) => {
    const b64 = e.target.result.split(',')[1];
    p._uploading = true;
    updateUI();
    showLoad('Subiendo foto...');
    try {
      const resp = await gasPost({ action: 'subirComprobante', base64: b64, numeroCliente: p.numeroCliente });
      if (resp && resp.fileId) {
        p.comprobanteId = resp.fileId;
        pushOneToFirebase(p);
        cacheLocal();
        toast('📷 Foto subida');
      } else {
        toast('Error al subir foto');
      }
    } catch (e) {
      // Queue for later
      try {
        const pq = JSON.parse(localStorage.getItem('photoQueue') || '[]');
        pq.push({ base64: b64, numeroCliente: p.numeroCliente });
        localStorage.setItem('photoQueue', JSON.stringify(pq));
        toast('Sin conexión: foto guardada para después');
      } catch (_) {}
    }
    p._uploading = false;
    updateUI();
    render();
    hideLoad();
  };
  reader.readAsDataURL(file);
}

// ─── BOTTOM BAR ACTIONS ──────────────────────────────
async function saveOrder() {
  showLoad('Guardando orden...');
  const orderData = S.pedidos.map(p => ({ numeroCliente: p.numeroCliente, orden: p.orden }));
  await pushAllToFirebase();
  try {
    await gasPost({ action: 'guardarDatosReparto', pedidos: orderData });
    toast('💾 Orden guardado');
  } catch (e) {
    toast('Orden guardado localmente');
  }
  render();
  hideLoad();
}

async function openRoute() {
  showLoad('Generando ruta...');
  try {
    const resp = await gasPost({ action: 'obtenerUrlRuta', turno: S.turno });
    hideLoad();
    if (resp && resp.url) {
      window.open(resp.url, '_blank');
    } else {
      toast('No hay clientes pendientes para la ruta');
    }
  } catch (e) {
    hideLoad();
    // Fallback: build route from local data
    const pending = S.pedidos.filter(p => !p.entregado).sort((a, b) => (a.orden || 9999) - (b.orden || 9999));
    if (pending.length === 0) return toast('No hay pendientes');
    const origin = encodeURIComponent('Languenhein 1095, Longchamps, Buenos Aires, Argentina');
    const addrs = pending.map(p => {
      if (p.coordenadas) return encodeURIComponent(p.coordenadas);
      return encodeURIComponent((p.domicilio || '') + ', ' + (p.localidad || '') + ', Argentina');
    });
    window.open('https://www.google.com/maps/dir/' + origin + '/' + addrs.join('/'), '_blank');
  }
}

async function sendRendicion() {
  const pending = S.pedidos.filter(p => !p.entregado && !p.devolucion);
  if (pending.length > 0) return toast('Quedan ' + pending.length + ' pedidos pendientes');
  if (!confirm('¿Enviar la rendición para el turno ' + S.turno + '? Esta acción es irreversible.')) return;

  showLoad('Enviando rendición...');
  try {
    const resp = await gasPost({ action: 'enviarRendicion', repartidor: S.repartidor, turno: S.turno });
    hideLoad();
    if (resp && resp.message) {
      toast('✅ ' + resp.message, 5000);
      localStorage.removeItem(`cache_${fechaAR()}_${S.turno}`);
      // Clear Firebase
      await db.ref(fbPath()).remove();
      S.pedidos = [];
      render();
    } else {
      toast('Error en rendición: ' + (resp?.message || 'desconocido'));
    }
  } catch (e) {
    hideLoad();
    toast('Error al enviar rendición: ' + e.message);
  }
}

// ─── EVENT LISTENERS ─────────────────────────────────
$('mBtnOk').addEventListener('click', () => markDelivered(false));
$('mBtnNoPay').addEventListener('click', () => markDelivered(true));
$('mBtnClose').addEventListener('click', closeModal);
$('modalBg').addEventListener('click', e => { if (e.target === $('modalBg')) closeModal(); });

$('mBtnPhoto').addEventListener('click', () => $('fileCamera').click());
$('mBtnGallery').addEventListener('click', () => $('fileGallery').click());
$('fileCamera').addEventListener('change', e => handlePhoto(e.target.files[0]));
$('fileGallery').addEventListener('change', e => handlePhoto(e.target.files[0]));

$('btnSave').addEventListener('click', saveOrder);
$('btnRoute').addEventListener('click', openRoute);
$('btnSend').addEventListener('click', sendRendicion);

// Online/offline
window.addEventListener('online', () => {
  setSync('syncing');
  flushGasRetryQueue();
  toast('Conexión restablecida');
});
window.addEventListener('offline', () => {
  setSync('off');
  toast('Sin conexión. Los cambios se guardan localmente.');
});

// ─── BOOT ────────────────────────────────────────────
initLogin();

// Expose for onclick in cards
window.openModal = openModal;
window.updateOrden = updateOrden;
</script>
</body>
</html>
