<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="theme-color" content="#ffffff"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<link rel="manifest" href="manifest.json"/>
<link rel="icon" href="icon-192.png"/>
<link rel="apple-touch-icon" href="icon-192.png"/>
<title>Reparto ML</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@600&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#f5f6fa;--surface:#ffffff;--surface2:#f0f2f5;--surface3:#e8eaef;
  --border:#d5d9e2;--border-hi:#b0b8c9;
  --text:#1a1d26;--text2:#5a6072;--text3:#8b91a3;
  --accent:#2563eb;--accent-hi:#3b82f6;--accent-bg:rgba(37,99,235,.08);
  --ok:#16a34a;--ok-bg:rgba(22,163,74,.08);--ok-border:#86efac;
  --warn:#d97706;--warn-bg:rgba(217,119,6,.08);--warn-border:#fcd34d;
  --danger:#dc2626;--danger-bg:rgba(220,38,38,.06);
  --radius:14px;--radius-sm:10px;
  --font:'DM Sans',system-ui,-apple-system,sans-serif;
  --mono:'JetBrains Mono',ui-monospace,monospace;
  --shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --shadow-lg:0 4px 12px rgba(0,0,0,.08);
  --safe-b:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:var(--font);background:var(--bg);color:var(--text);display:flex;flex-direction:column;height:100dvh;-webkit-font-smoothing:antialiased}

.topbar{flex-shrink:0;padding:12px 16px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;gap:10px;z-index:20;box-shadow:var(--shadow)}
.topbar-left{display:flex;align-items:center;gap:10px}
.topbar-logo{height:32px;border-radius:6px}
.topbar h1{font-size:1.1rem;font-weight:700;color:var(--text)}
.topbar .chip{font-family:var(--mono);font-size:.78rem;font-weight:600;padding:5px 12px;border-radius:999px;background:var(--accent-bg);border:1px solid rgba(37,99,235,.2);color:var(--accent)}

.info-strip{flex-shrink:0;padding:8px 16px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;font-size:.85rem;color:var(--text2)}
.info-strip strong{color:var(--text)}

.progress-bar{flex-shrink:0;height:3px;background:var(--surface2)}
.progress-bar .fill{height:100%;background:linear-gradient(90deg,var(--ok),#4ade80);transition:width .4s ease;width:0%}

.scroll-area{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;padding:10px 12px 100px}

.bottom-bar{flex-shrink:0;padding:10px 12px calc(10px + var(--safe-b));background:var(--surface);border-top:1px solid var(--border);display:flex;gap:8px;z-index:20;box-shadow:0 -1px 3px rgba(0,0,0,.04)}
.btn-bar{flex:1;border:none;border-radius:var(--radius-sm);padding:12px 6px;font-family:var(--font);font-size:.82rem;font-weight:600;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;transition:all .15s ease;color:#fff}
.btn-bar .ico{font-size:1.2rem}
.btn-bar:active{transform:scale(.96)}
.btn-bar:disabled{opacity:.35;pointer-events:none}
.btn-save{background:var(--accent)}
.btn-route{background:#475569}
.btn-send{background:var(--ok)}

.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:10px;cursor:pointer;transition:all .12s ease;box-shadow:var(--shadow)}
.card:active{transform:scale(.985);border-color:var(--border-hi)}
.card.done{background:var(--ok-bg);border-color:var(--ok-border)}
.card.done .card-name{text-decoration:line-through;opacity:.6}
.card.dev{background:var(--warn-bg);border-color:var(--warn-border)}
.card.nopay{border-left:4px solid var(--danger)}

.card-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.card-num{font-family:var(--mono);font-size:.82rem;font-weight:600;color:var(--accent)}
.card-orden{width:48px;height:32px;text-align:center;font-family:var(--mono);font-size:1rem;font-weight:600;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text)}
.card-orden:focus{border-color:var(--accent);outline:none;box-shadow:0 0 0 2px rgba(37,99,235,.2)}
.card-name{font-size:1.05rem;font-weight:600;margin-bottom:4px}
.card-addr{font-size:.82rem;color:var(--text2);margin-bottom:6px}
.card-badges{display:flex;gap:6px;flex-wrap:wrap;font-size:.78rem;font-weight:600}
.badge{padding:3px 8px;border-radius:6px}
.badge-ok{background:var(--ok-bg);color:var(--ok)}
.badge-pend{background:var(--danger-bg);color:var(--danger)}
.badge-dev{background:var(--warn-bg);color:var(--warn)}
.badge-nopay{background:var(--danger-bg);color:var(--danger)}
.badge-photo{background:var(--accent-bg);color:var(--accent)}

.empty-state{text-align:center;padding:3rem 1rem;color:var(--text3)}

.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;display:none;align-items:flex-end;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:var(--surface);border-radius:20px 20px 0 0;width:100%;max-width:500px;max-height:88vh;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:20px 18px calc(20px + var(--safe-b));border-top:1px solid var(--border);animation:slideUp .25s ease;box-shadow:var(--shadow-lg)}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal h3{font-size:1.1rem;margin-bottom:14px}
.modal .field{margin-bottom:14px}
.modal label{display:block;font-size:.82rem;font-weight:600;color:var(--text2);margin-bottom:5px}
.modal select,.modal input[type="number"],.modal textarea{width:100%;padding:11px 12px;font-size:1rem;font-family:var(--font);background:var(--surface2);color:var(--text);border:1px solid var(--border);border-radius:var(--radius-sm)}
.modal select:focus,.modal input:focus,.modal textarea:focus{border-color:var(--accent);outline:none;box-shadow:0 0 0 2px rgba(37,99,235,.15)}
.modal textarea{resize:vertical;min-height:56px}
.modal .pay-group{border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px;margin-bottom:12px;background:var(--surface2)}
.modal .pay-group legend{font-size:.8rem;font-weight:700;color:var(--accent);padding:0 4px}
.modal .pay-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:8px}
.modal .dev-row{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.modal .dev-row input[type="checkbox"]{width:24px;height:24px;accent-color:var(--warn)}
.modal-actions{display:flex;flex-direction:column;gap:8px;margin-top:16px}
.mbtn{width:100%;padding:13px;border:none;border-radius:var(--radius-sm);font-family:var(--font);font-size:.92rem;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .12s ease}
.mbtn:active{transform:scale(.97)}
.mbtn:disabled{opacity:.4;pointer-events:none}
.mbtn-ok{background:var(--ok);color:#fff}
.mbtn-nopay{background:var(--warn);color:#fff}
.mbtn-photo{background:var(--accent);color:#fff}
.mbtn-gallery{background:#0284c7;color:#fff}
.mbtn-close{background:var(--surface2);color:var(--text2);border:1px solid var(--border)}
.modal .locked-overlay{position:absolute;inset:0;background:rgba(255,255,255,.9);display:none;align-items:center;justify-content:center;font-size:1.1rem;font-weight:700;color:var(--danger);border-radius:20px 20px 0 0;z-index:5}
.modal .locked-overlay.show{display:flex}

.toast{position:fixed;bottom:calc(90px + var(--safe-b));left:50%;transform:translateX(-50%) translateY(20px);background:var(--text);color:#fff;padding:10px 18px;border-radius:var(--radius-sm);font-size:.88rem;font-weight:500;box-shadow:var(--shadow-lg);opacity:0;transition:all .3s ease;pointer-events:none;z-index:200;text-align:center;max-width:90%}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.loading-bg{position:fixed;inset:0;background:rgba(255,255,255,.85);display:none;align-items:center;justify-content:center;flex-direction:column;gap:14px;z-index:300;color:var(--text);font-size:1rem;font-weight:500}
.loading-bg.show{display:flex}
.spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.login-screen{position:fixed;inset:0;background:#fff;z-index:500;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;padding:24px}
.login-screen h2{font-size:1.4rem;text-align:center;color:var(--text)}
.login-screen p{color:var(--text2);font-size:.9rem;text-align:center}
.login-logo{width:180px;margin-bottom:8px}
.login-input{width:100%;max-width:320px;padding:14px;font-size:1.1rem;font-family:var(--font);background:var(--surface2);color:var(--text);border:1px solid var(--border);border-radius:var(--radius);text-align:center}
.login-input:focus{border-color:var(--accent);outline:none}
.login-btn{width:100%;max-width:320px;padding:14px;border:none;border-radius:var(--radius);background:var(--accent);color:#fff;font-size:1rem;font-weight:700;cursor:pointer}

.turno-screen{position:fixed;inset:0;background:#fff;z-index:400;display:none;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:24px}
.turno-screen.show{display:flex}
.turno-screen h2{font-size:1.3rem;color:var(--text)}
.turno-btn{width:100%;max-width:300px;padding:18px;border:2px solid var(--border);border-radius:var(--radius);background:var(--surface);color:var(--text);font-size:1.1rem;font-weight:700;cursor:pointer;text-align:center;transition:all .15s ease}
.turno-btn:hover{border-color:var(--accent);background:var(--accent-bg)}
.turno-btn:disabled{opacity:.35;pointer-events:none}
.turno-btn .sub{font-size:.8rem;font-weight:400;color:var(--text3);margin-top:4px}

.sync-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:4px;vertical-align:middle}
.sync-dot.ok{background:var(--ok)}
.sync-dot.syncing{background:var(--warn);animation:pulse 1s infinite}
.sync-dot.off{background:var(--danger)}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
</style>
</head>

<script>
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyAnkoNLZVW6bsus3XzJUZTNWWYaFNwKIwU",
  authDomain: "mercadolimpio-reparto.firebaseapp.com",
  databaseURL: "https://mercadolimpio-reparto-default-rtdb.firebaseio.com",
  projectId: "mercadolimpio-reparto",
  storageBucket: "mercadolimpio-reparto.firebasestorage.app",
  messagingSenderId: "283563066503",
  appId: "1:283563066503:web:db5ad2f760f9811fdae422"
};
const GAS_URL = 'https://gestiondereparto.santamariapablodaniel.workers.dev/';

firebase.initializeApp(FIREBASE_CONFIG);
firebase.auth().signInAnonymously().catch(e => console.warn('Auth:', e));
const db = firebase.database();

const S = { repartidor:'', turno:'', pedidos:[], modalIdx:-1, saving:false, fbReady:false, turnoFinalizado:false };
const $ = id => document.getElementById(id);

const fechaAR = () => {
  const d = new Date();
  const offset = d.getTimezoneOffset() + (-3 * 60);
  const local = new Date(d.getTime() - offset * 60000);
  return local.toISOString().slice(0, 10);
};
const money = n => Number(n||0).toLocaleString('es-AR',{minimumFractionDigits:2,maximumFractionDigits:2});
const fbPath = () => `reparto/${fechaAR()}/${S.turno}`;
const fbEstadoPath = () => `estado/${fechaAR()}`;

function toast(msg, ms=3000){ const t=$('toast');t.textContent=msg;t.classList.add('show');clearTimeout(toast._t);toast._t=setTimeout(()=>t.classList.remove('show'),ms); }
function showLoad(txt){ $('loadingText').textContent=txt;$('loadingBg').classList.add('show'); }
function hideLoad(){ $('loadingBg').classList.remove('show'); }
function setSync(s){ $('syncDot').className='sync-dot '+s;$('syncLabel').textContent=s==='ok'?'Sincronizado':s==='syncing'?'Sincronizando...':'Sin conexión'; }

// ─── LOGIN ──────────────────────────────────────
function initLogin(){
  const hoy=fechaAR(),key=`repartidor_${hoy}`,saved=localStorage.getItem(key);
  if(saved){S.repartidor=saved;$('loginScreen').style.display='none';showTurnoScreen();return;}
  $('loginBtn').onclick=()=>{const n=$('loginName').value.trim();if(!n)return toast('Ingresá tu nombre');S.repartidor=n;localStorage.setItem(key,n);$('loginScreen').style.display='none';showTurnoScreen();};
  $('loginName').addEventListener('keydown',e=>{if(e.key==='Enter')$('loginBtn').click();});
}

// ─── TURNO SCREEN ───────────────────────────────
function showTurnoScreen(){$('turnoScreen').classList.add('show');checkTurnoStatus();$('turnoManana').onclick=()=>selectTurno('Mañana');$('turnoTarde').onclick=()=>selectTurno('Tarde');}

async function checkTurnoStatus(){
  // Fast: Firebase
  try{
    const snap=await db.ref(fbEstadoPath()).once('value');
    const fbE=snap.val();
    if(fbE){applyTurnoButtons(fbE);if(fbE['Mañana']==='finalizado'&&fbE['Tarde']==='finalizado')return;}
  }catch(_){}
  // Certero: GAS
  try{
    const resp=await gasPost({action:'getEstadoTurnos',repartidor:S.repartidor});
    if(resp&&resp.estado){applyTurnoButtons(resp.estado);try{await db.ref(fbEstadoPath()).set(resp.estado);}catch(_){}}
  }catch(e){console.warn('GAS turno check failed:',e);}
}

function applyTurnoButtons(estado){
  ['Mañana','Tarde'].forEach(t=>{
    const st=estado[t]||'sinDatos';
    const btn=t==='Mañana'?$('turnoManana'):$('turnoTarde');
    const sub=t==='Mañana'?$('turnoMananaStatus'):$('turnoTardeStatus');
    if(st==='finalizado'){btn.disabled=true;sub.textContent='🔒 Finalizado';sub.style.color='#dc2626';}
    else if(st==='abierto'){btn.disabled=false;sub.textContent='📦 En curso';sub.style.color='#16a34a';}
    else{btn.disabled=false;sub.textContent='Sin datos';sub.style.color='';}
  });
  if(estado['Mañana']==='finalizado'&&estado['Tarde']==='finalizado')toast('🟢 Jornada completa',5000);
}

async function selectTurno(turno){
  try{const snap=await db.ref(fbEstadoPath()+'/'+turno).once('value');if(snap.val()==='finalizado'){toast('🔒 Turno ya finalizado');return;}}catch(_){}
  S.turno=turno;localStorage.setItem('ultimoTurno',turno);$('turnoScreen').classList.remove('show');startApp();
}

// ─── GAS POST ───────────────────────────────────
async function gasPost(body,timeout=15000){
  const c=new AbortController();const t=setTimeout(()=>c.abort(),timeout);
  try{const r=await fetch(GAS_URL,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify(body),signal:c.signal});clearTimeout(t);return r.json();}
  catch(e){clearTimeout(t);throw e;}
}

// ─── START APP ──────────────────────────────────
async function startApp(){
  $('chipTurno').textContent=S.turno;$('repartidorLabel').textContent=S.repartidor;
  S.turnoFinalizado=false;showLoad('Cargando pedidos...');
  let loaded=false;

  // 1) Firebase
  try{const snap=await db.ref(fbPath()+'/pedidos').once('value');const d=snap.val();
    if(d&&Object.keys(d).length>0){S.pedidos=Object.values(d);render();hideLoad();loaded=true;toast('📦 Pedidos cargados');}
  }catch(e){console.warn('FB read fail:',e);}

  // 2) localStorage
  if(!loaded){const c=localStorage.getItem(`cache_${fechaAR()}_${S.turno}`);
    if(c){try{S.pedidos=JSON.parse(c);render();hideLoad();loaded=true;toast('📱 Desde caché');}catch(_){}}
  }

  // 3) GAS (blocking only if nothing loaded yet)
  if(!loaded){
    try{
      const resp=await gasPost({action:'obtenerDatosReparto',turno:S.turno,repartidor:S.repartidor});
      if(resp&&resp.isTurnoFinalizado){hideLoad();S.pedidos=[];S.turnoFinalizado=true;render();toast('🔒 Turno finalizado',4000);
        try{await db.ref(fbEstadoPath()+'/'+S.turno).set('finalizado');}catch(_){}lockUI();setupRealtimeSync();return;}
      if(resp&&Array.isArray(resp.pedidos)&&resp.pedidos.length>0){S.pedidos=resp.pedidos;await pushAllToFirebase();render();hideLoad();loaded=true;toast('📦 Sincronizado');}
    }catch(e){console.warn('GAS load fail:',e);}
  }
  if(!loaded){hideLoad();toast('No hay pedidos para este turno');}

  // Background verify with GAS
  if(loaded){
    gasPost({action:'obtenerDatosReparto',turno:S.turno,repartidor:S.repartidor}).then(resp=>{
      if(resp&&resp.isTurnoFinalizado){toast('🔒 Turno finalizado');S.turnoFinalizado=true;
        try{db.ref(fbEstadoPath()+'/'+S.turno).set('finalizado');}catch(_){}
        try{db.ref(fbPath()).remove();}catch(_){}lockUI();return;}
      if(resp&&Array.isArray(resp.pedidos)&&resp.pedidos.length>0&&resp.pedidos.length!==S.pedidos.length){
        S.pedidos=resp.pedidos;pushAllToFirebase();render();cacheLocal();}
    }).catch(e=>console.warn('BG GAS check fail:',e));
  }
  setupRealtimeSync();
}

function lockUI(){$('btnSave').disabled=true;$('btnRoute').disabled=true;$('btnSend').disabled=true;}

// ─── FIREBASE SYNC ──────────────────────────────
function setupRealtimeSync(){
  db.ref(fbPath()+'/pedidos').on('value',snap=>{const d=snap.val();if(!d||S.saving)return;const inc=Object.values(d);
    if(JSON.stringify(inc)!==JSON.stringify(S.pedidos)){S.pedidos=inc;render();cacheLocal();}});S.fbReady=true;
}
async function pushAllToFirebase(){try{const o={};S.pedidos.forEach(p=>{o[p.numeroCliente||Math.random()]=p;});await db.ref(fbPath()+'/pedidos').set(o);setSync('ok');}catch(e){setSync('off');}}
async function pushOneToFirebase(p){try{setSync('syncing');await db.ref(fbPath()+'/pedidos/'+p.numeroCliente).set(p);setSync('ok');}catch(e){setSync('off');}}
function cacheLocal(){try{localStorage.setItem(`cache_${fechaAR()}_${S.turno}`,JSON.stringify(S.pedidos));}catch(_){}}

let gasSyncTimeout=null;
function scheduleGasSync(){clearTimeout(gasSyncTimeout);gasSyncTimeout=setTimeout(async()=>{try{await gasPost({action:'guardarDatosReparto',pedidos:S.pedidos});}catch(e){console.warn('GAS bg sync fail:',e);}},3000);}

// ─── RENDER ─────────────────────────────────────
function render(){
  const c=$('cardContainer'),e=$('emptyState');
  if(S.pedidos.length===0){c.innerHTML='';e.style.display='block';updateUI();return;}
  e.style.display='none';
  const sorted=[...S.pedidos].sort((a,b)=>{if(!a.entregado&&b.entregado)return-1;if(a.entregado&&!b.entregado)return 1;return(Number(a.orden)||9999)-(Number(b.orden)||9999);});
  c.innerHTML=sorted.map(p=>{
    const ri=S.pedidos.indexOf(p);const tp=(Number(p.importePagado1)||0)+(Number(p.importePagado2)||0);const np=p.entregado&&!p.devolucion&&tp===0;
    let cls='card';if(p.entregado)cls+=' done';if(p.devolucion)cls+=' dev';if(np)cls+=' nopay';
    let bd='';if(p.entregado)bd+='<span class="badge badge-ok">✅ Entregado</span>';else bd+='<span class="badge badge-pend">Pendiente</span>';
    if(p.devolucion)bd+='<span class="badge badge-dev">⚠️ Devolución</span>';if(np)bd+='<span class="badge badge-nopay">🔴 Sin pago</span>';if(p.comprobanteId)bd+='<span class="badge badge-photo">📷</span>';
    return`<div class="${cls}" onclick="openModal(${ri})"><div class="card-top"><span class="card-num">Nº ${p.numeroCliente||''}</span><input type="number" class="card-orden" value="${p.orden||''}" ${p.entregado?'disabled':''} onclick="event.stopPropagation()" onchange="updateOrden(${ri},this.value)" min="1"/></div><div class="card-name">${p.nombre||''}</div><div class="card-addr">📍 ${p.domicilio||''}, ${p.localidad||''}</div><div class="card-badges">${bd}</div></div>`;
  }).join('');updateUI();cacheLocal();
}
function updateUI(){const t=S.pedidos.length,d=S.pedidos.filter(p=>p.entregado).length;$('contadorLabel').textContent=`${d}/${t}`;$('progressFill').style.width=(t>0?Math.round(d/t*100):0)+'%';
  const allDone=t>0&&d===t;$('btnSend').disabled=S.turnoFinalizado||!allDone||S.pedidos.some(p=>p._uploading);$('btnSave').disabled=S.turnoFinalizado;$('btnRoute').disabled=S.turnoFinalizado;}
function updateOrden(i,v){S.pedidos[i].orden=parseInt(v)||0;pushOneToFirebase(S.pedidos[i]);scheduleGasSync();cacheLocal();}

// ─── MODAL ──────────────────────────────────────
function openModal(i){const p=S.pedidos[i];if(!p)return;S.modalIdx=i;
  $('mTitle').textContent=`${p.nombre||'Cliente'} — Nº ${p.numeroCliente}`;$('mImporte').textContent='$ '+money(p.importeTotal);
  $('mFP1').value=p.formaPago1||'';$('mImp1').value=p.importePagado1||'';$('mFP2').value=p.formaPago2||'';$('mImp2').value=p.importePagado2||'';$('mDev').checked=!!p.devolucion;$('mNotas').value=p.notasDevolucion||'';
  const locked=!!p.entregado;$('lockedOverlay').classList.toggle('show',locked);
  ['mFP1','mImp1','mFP2','mImp2','mDev','mNotas','mBtnOk','mBtnNoPay','mBtnPhoto','mBtnGallery'].forEach(id=>$(id).disabled=locked);
  $('modalBg').classList.add('open');}
function closeModal(){$('modalBg').classList.remove('open');S.modalIdx=-1;}

async function markDelivered(noPay=false){
  if(S.saving||S.modalIdx<0)return;const p=S.pedidos[S.modalIdx];
  if(noPay){p.formaPago1='No pagó';p.importePagado1=0;p.formaPago2='';p.importePagado2=0;p.devolucion=false;p.notasDevolucion=$('mNotas').value.trim();}
  else{p.formaPago1=$('mFP1').value;p.importePagado1=parseFloat($('mImp1').value)||0;p.formaPago2=$('mFP2').value;p.importePagado2=parseFloat($('mImp2').value)||0;p.devolucion=$('mDev').checked;p.notasDevolucion=$('mNotas').value.trim();}
  if(!noPay&&!p.devolucion&&!p.formaPago1&&(p.importeTotal||0)>0)return toast('Registrá un pago o marcá como devolución');
  p.entregado=true;S.saving=true;closeModal();render();await pushOneToFirebase(p);cacheLocal();toast(noPay?'🚫 Entregado (sin pago)':'✅ Entregado');
  try{await gasPost({action:'guardarDatosReparto',pedidos:[p]});}catch(e){queueGasRetry(p);}S.saving=false;}

function queueGasRetry(p){try{const k='gasRetryQueue',q=JSON.parse(localStorage.getItem(k)||'[]');q.push(p);localStorage.setItem(k,JSON.stringify(q));}catch(_){}}
async function flushGasRetryQueue(){const k='gasRetryQueue',q=JSON.parse(localStorage.getItem(k)||'[]');if(!q.length)return;try{await gasPost({action:'guardarDatosReparto',pedidos:q});localStorage.removeItem(k);toast('📤 Pendientes sincronizados');}catch(_){}}

// ─── PHOTOS ─────────────────────────────────────
function handlePhoto(file){if(!file||S.modalIdx<0)return;const p=S.pedidos[S.modalIdx];const r=new FileReader();
  r.onload=async e=>{const b64=e.target.result.split(',')[1];p._uploading=true;updateUI();showLoad('Subiendo foto...');
    try{const resp=await gasPost({action:'subirComprobante',base64:b64,numeroCliente:p.numeroCliente});if(resp&&resp.fileId){p.comprobanteId=resp.fileId;pushOneToFirebase(p);cacheLocal();toast('📷 Foto subida');}else toast('Error al subir foto');}
    catch(e){try{const pq=JSON.parse(localStorage.getItem('photoQueue')||'[]');pq.push({base64:b64,numeroCliente:p.numeroCliente});localStorage.setItem('photoQueue',JSON.stringify(pq));toast('Sin conexión: foto guardada');}catch(_){}}
    p._uploading=false;updateUI();render();hideLoad();};r.readAsDataURL(file);}

// ─── BOTTOM BAR ─────────────────────────────────
async function saveOrder(){showLoad('Guardando...');await pushAllToFirebase();try{await gasPost({action:'guardarDatosReparto',pedidos:S.pedidos.map(p=>({numeroCliente:p.numeroCliente,orden:p.orden}))});toast('💾 Orden guardado');}catch(e){toast('Guardado localmente');}render();hideLoad();}

async function openRoute(){showLoad('Generando ruta...');
  try{const resp=await gasPost({action:'obtenerUrlRuta',turno:S.turno});hideLoad();if(resp&&resp.url)window.open(resp.url,'_blank');else toast('No hay pendientes');}
  catch(e){hideLoad();const pend=S.pedidos.filter(p=>!p.entregado).sort((a,b)=>(a.orden||9999)-(b.orden||9999));if(!pend.length)return toast('No hay pendientes');
    const o=encodeURIComponent('Languenhein 1095, Longchamps, Buenos Aires, Argentina');
    const addrs=pend.map(p=>p.coordenadas?encodeURIComponent(p.coordenadas):encodeURIComponent((p.domicilio||'')+', '+(p.localidad||'')+', Argentina'));
    window.open('https://www.google.com/maps/dir/'+o+'/'+addrs.join('/'),'_blank');}}

async function sendRendicion(){
  const pend=S.pedidos.filter(p=>!p.entregado&&!p.devolucion);if(pend.length>0)return toast('Quedan '+pend.length+' pendientes');
  if(!confirm('¿Enviar rendición del turno '+S.turno+'? Acción irreversible.'))return;
  showLoad('Enviando rendición...');
  try{const resp=await gasPost({action:'enviarRendicion',repartidor:S.repartidor,turno:S.turno});hideLoad();
    if(resp&&resp.message){toast('✅ '+resp.message,5000);localStorage.removeItem(`cache_${fechaAR()}_${S.turno}`);
      try{await db.ref(fbEstadoPath()+'/'+S.turno).set('finalizado');}catch(_){}
      try{await db.ref(fbPath()).remove();}catch(_){}
      S.pedidos=[];S.turnoFinalizado=true;render();lockUI();}
    else toast('Error: '+(resp?.message||'desconocido'));}
  catch(e){hideLoad();toast('Error: '+e.message);}}

// ─── EVENTS ─────────────────────────────────────
$('mBtnOk').addEventListener('click',()=>markDelivered(false));
$('mBtnNoPay').addEventListener('click',()=>markDelivered(true));
$('mBtnClose').addEventListener('click',closeModal);
$('modalBg').addEventListener('click',e=>{if(e.target===$('modalBg'))closeModal();});
$('mBtnPhoto').addEventListener('click',()=>$('fileCamera').click());
$('mBtnGallery').addEventListener('click',()=>$('fileGallery').click());
$('fileCamera').addEventListener('change',e=>handlePhoto(e.target.files[0]));
$('fileGallery').addEventListener('change',e=>handlePhoto(e.target.files[0]));
$('btnSave').addEventListener('click',saveOrder);
$('btnRoute').addEventListener('click',openRoute);
$('btnSend').addEventListener('click',sendRendicion);
window.addEventListener('online',()=>{setSync('syncing');flushGasRetryQueue();toast('Conexión restablecida');});
window.addEventListener('offline',()=>{setSync('off');toast('Sin conexión');});

initLogin();
if('serviceWorker'in navigator)navigator.serviceWorker.register('./sw.js').catch(e=>console.warn('SW:',e));
window.openModal=openModal;window.updateOrden=updateOrden;
</script>
</body></html>
